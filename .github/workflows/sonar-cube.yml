name: SonarQube
# SonarCloud Automatic Analysis handles quality scanning for this project.
# This workflow exists only to satisfy the 'SonarQube' required status check.
# See: https://sonarcloud.io → Project Settings → Analysis Method
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  sonarqube:
    name: SonarQube
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - run: echo "Quality analysis is handled by SonarCloud Automatic Analysis."
