name: Deploy to VPS
on:
  push:
    branches: [production]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@7dbf6e96f2e1eb08d7a41cbba20af13e62b0bac9 # v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/app
            git pull
            PNPM_MAJOR=$(pnpm --version 2>/dev/null | cut -d. -f1 || echo "0")
            if ! command -v pnpm &> /dev/null || [ "$PNPM_MAJOR" -lt 11 ]; then
              echo "Installing pnpm 11..."
              npm install -g pnpm@11.0.6 || curl -fsSL https://get.pnpm.io/install.sh | sh -
            fi
            pnpm install --frozen-lockfile
            pnpm build
